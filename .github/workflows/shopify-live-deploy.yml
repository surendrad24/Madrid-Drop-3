name: Deploy Shopify Live Theme

on:
  workflow_run:
    workflows:
      - Deploy Shopify Staging Theme
    types:
      - completed
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      confirm_live_deploy:
        description: "Type DEPLOY_LIVE to manually force live deployment"
        required: true
        type: string

concurrency:
  group: shopify-live-theme-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') || (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_live_deploy == 'DEPLOY_LIVE') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Push to live Shopify theme
        env:
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_FLAG_STORE }}
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_FLAG_THEME_ID: ${{ secrets.SHOPIFY_FLAG_THEME_ID }}
        run: |
          shopify theme push \
            --store "$SHOPIFY_FLAG_STORE" \
            --password "$SHOPIFY_CLI_THEME_TOKEN" \
            --theme "$SHOPIFY_FLAG_THEME_ID" \
            --allow-live \
            --json
